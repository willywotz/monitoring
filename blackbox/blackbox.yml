modules:
  icmp:
    prober: icmp
    timeout: 5s
    icmp:
      preferred_ip_protocol: ip4

  http:
    prober: http
    timeout: 5s
    http:
      preferred_ip_protocol: ip4
      valid_status_codes:
        - 200
        - 201
        - 202
        - 203
        - 204
      follow_redirects: true

  dns:
    prober: dns
    timeout: 5s
    dns:
      preferred_ip_protocol: ip4
      query_name: "example.com"
      query_type: "A"
      # validation_rfc1035:
      #   fail_if_not_matches_regexp:
      #     - ".*"
