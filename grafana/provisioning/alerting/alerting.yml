contactPoints:
  - orgId: 1
    name: telegram
    receivers:
      - uid: telegram
        type: telegram
        settings:
          bottoken: $TELEGRAM_BOT_TOKEN
          chatid: "-5088284084"
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: telegram
    group_by:
      - alertname
      - instance
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
